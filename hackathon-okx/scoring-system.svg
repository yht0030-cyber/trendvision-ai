<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="700" height="320" fill="url(#bg)" rx="12"/>
  
  <text x="350" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">量化评分体系（10 分制）</text>
  
  <!-- Table header -->
  <rect x="40" y="55" width="180" height="35" rx="6" fill="#3b82f6" opacity="0.3"/>
  <text x="130" y="77" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">类别</text>
  
  <rect x="224" y="55" width="100" height="35" rx="6" fill="#3b82f6" opacity="0.3"/>
  <text x="274" y="77" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">满分</text>
  
  <rect x="328" y="55" width="332" height="35" rx="6" fill="#3b82f6" opacity="0.3"/>
  <text x="494" y="77" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">明细</text>
  
  <!-- Row 1 -->
  <rect x="40" y="94" width="180" height="50" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="130" y="124" text-anchor="middle" fill="#a5b4fc" font-size="13">基础择时</text>
  
  <rect x="224" y="94" width="100" height="50" rx="4" fill="#6366f1" opacity="0.1"/>
  <text x="274" y="124" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">5</text>
  
  <rect x="328" y="94" width="332" height="50" rx="4" fill="#6366f1" opacity="0.1"/>
  <text x="345" y="118" fill="#cbd5e1" font-size="12">价格位置 2 + RSI 位置 1</text>
  <text x="345" y="136" fill="#cbd5e1" font-size="12">+ K线反转形态 2（仅关键位置有效）</text>
  
  <!-- Row 2 -->
  <rect x="40" y="148" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.15"/>
  <text x="130" y="178" text-anchor="middle" fill="#c4b5fd" font-size="13">系统工具</text>
  
  <rect x="224" y="148" width="100" height="50" rx="4" fill="#8b5cf6" opacity="0.1"/>
  <text x="274" y="178" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">5</text>
  
  <rect x="328" y="148" width="332" height="50" rx="4" fill="#8b5cf6" opacity="0.1"/>
  <text x="345" y="172" fill="#cbd5e1" font-size="12">拐点线突破 3 + 分界点A突破 1</text>
  <text x="345" y="190" fill="#cbd5e1" font-size="12">+ 趋势线突破 1</text>
  
  <!-- Divider -->
  <line x1="60" y1="215" x2="640" y2="215" stroke="#475569" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Rules -->
  <rect x="40" y="230" width="620" height="75" rx="8" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1"/>
  <text x="60" y="253" fill="#86efac" font-size="13" font-weight="600">触发规则</text>
  <text x="60" y="273" fill="#94a3b8" font-size="12">≥ 5 分 → 触发信号</text>
  <text x="60" y="293" fill="#94a3b8" font-size="12">趋势线 + 分界点A 同时突破 → 最强信号（额外 +1 分，无视门槛直接触发）</text>
</svg>
