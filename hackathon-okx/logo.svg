<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Circle BG -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Chart icon -->
  <!-- Upward arrow / trend line -->
  <polyline points="70,280 130,240 180,250 240,180 300,120 330,100" 
            fill="none" stroke="url(#g1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Second trend line -->
  <polyline points="100,300 160,260 210,220 270,160 320,130" 
            fill="none" stroke="url(#g2)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  
  <!-- Candlesticks -->
  <g stroke="#22c55e" stroke-width="5" stroke-linecap="round">
    <!-- Green candles -->
    <line x1="100" y1="310" x2="100" y2="270"/>
    <rect x="95" y="275" width="10" height="35" fill="#22c55e" rx="2"/>
    
    <line x1="140" y1="280" x2="140" y2="250"/>
    <rect x="135" y="255" width="10" height="25" fill="#22c55e" rx="2"/>
    
    <line x1="180" y1="260" x2="180" y2="230"/>
    <rect x="175" y="235" width="10" height="25" fill="#22c55e" rx="2"/>
  </g>
  
  <g stroke="#ef4444" stroke-width="5" stroke-linecap="round">
    <!-- Red candle -->
    <line x1="220" y1="230" x2="220" y2="200"/>
    <rect x="215" y="200" width="10" height="30" fill="#ef4444" rx="2"/>
  </g>
  
  <!-- Circle accent -->
  <circle cx="300" cy="120" r="12" fill="#22c55e" opacity="0.9"/>
  
  <!-- TV Text -->
  <text x="200" y="185" text-anchor="middle" fill="white" font-size="80" font-weight="800" letter-spacing="-3">TV</text>
  
  <!-- Subtitle -->
  <rect x="120" y="200" width="160" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="200" y="219" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">AI</text>
  
  <!-- Bottom text -->
  <text x="200" y="270" text-anchor="middle" fill="#475569" font-size="11" letter-spacing="2">TRENDVISION</text>
  
  <!-- Decorative dots -->
  <circle cx="80" cy="100" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="320" cy="300" r="4" fill="#a855f7" opacity="0.3"/>
  <circle cx="350" cy="80" r="2" fill="#60a5fa" opacity="0.2"/>
  <circle cx="60" cy="330" r="2" fill="#a78bfa" opacity="0.2"/>
</svg>
